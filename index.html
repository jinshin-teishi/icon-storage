<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Icon Storage</title>

<style>

body{
  background:#222;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

h1{
  margin-bottom:40px;
}

h2{
  border-left:5px solid #888;
  padding-left:10px;
  margin-top:40px;
}

.icon-grid{
  display:flex;
  flex-wrap:wrap;
  gap:16px;
}

.icon-card{
  background:#333;
  padding:10px;
  border-radius:10px;
  text-align:center;
  transition:0.2s;
}

.icon-card:hover{
  transform:scale(1.03);
}

.icon-card img{
  width:128px;
  height:128px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

.file-name{
  margin-top:8px;
  font-size:12px;
  color:#aaa;
  width:128px;
  word-break:break-all;
}

</style>
</head>

<body>

<h1>Icon Storage</h1>

<div id="app"></div>

<script>

// ========================
// 設定
// ========================

const USER_NAME = "ここにGitHubユーザー名";
const REPO_NAME = "ここにRepository名";

// ========================

const app = document.getElementById("app");

// iconsフォルダ取得
loadCharacters();

async function loadCharacters(){

  const response = await fetch(
    `https://api.github.com/repos/${USER_NAME}/${REPO_NAME}/contents/icons`
  );

  const folders = await response.json();

  for(const folder of folders){

    // フォルダだけ対象
    if(folder.type !== "dir"){
      continue;
    }

    createCharacterSection(folder.name);

  }

}

async function createCharacterSection(characterName){

  // 見出し
  const title = document.createElement("h2");
  title.textContent = characterName;
  app.appendChild(title);

  // グリッド
  const grid = document.createElement("div");
  grid.className = "icon-grid";
  app.appendChild(grid);

  // フォルダ内画像取得
  const response = await fetch(
    `https://api.github.com/repos/${USER_NAME}/${REPO_NAME}/contents/icons/${characterName}`
  );

  const files = await response.json();

  for(const file of files){

    if(file.type !== "file"){
      continue;
    }

    createIconCard(grid, file);

  }

}

function createIconCard(grid, file){

  const card = document.createElement("div");
  card.className = "icon-card";

  card.innerHTML = `
    <img src="${file.download_url}">
    <div class="file-name">${file.name}</div>
  `;

  const img = card.querySelector("img");

  img.onclick = () => {

    navigator.clipboard.writeText(file.download_url);

    alert("URLをコピーしました！\n\n" + file.download_url);

  };

  grid.appendChild(card);

}

</script>

</body>
</html>
